<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#080A0F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Life OS</title>
<link rel="manifest" href="./manifest.json">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{--bg:#080A0F;--s1:#0E1117;--s2:#151921;--brd:rgba(255,255,255,0.05);--brd2:rgba(255,255,255,0.09);--t1:#E8E2D6;--t2:#B8AFA0;--t3:#7A7265;--t4:#4A443C;--acc:#E2A55A;--acc2:#C4883C;--acc-a:rgba(226,165,90,0.12);--red:#E85D5D;--green:#4ADE80;--blue:#60A5FA;--purple:#C084FC;--mono:'IBM Plex Mono',monospace;--sans:'Sora',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:var(--sans);background:var(--bg);color:var(--t2);min-height:100dvh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
input,textarea,button,select{font-family:inherit}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
:focus{outline:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fi{animation:fadeIn .25s ease}

/* Login Screen */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:40px 24px;text-align:center}
.login-logo{font-size:48px;color:var(--acc);margin-bottom:16px}
.login-title{font-size:28px;font-weight:800;color:var(--t1);letter-spacing:-1px;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--t4);margin-bottom:32px;line-height:1.5;max-width:280px}
.login-g-btn{display:flex;align-items:center;gap:10px;padding:12px 24px;border-radius:12px;border:1.5px solid var(--brd2);background:var(--s1);color:var(--t1);font-size:14px;font-weight:600;cursor:pointer;margin-bottom:12px;transition:all .15s}
.login-g-btn:hover{border-color:var(--acc);background:var(--acc-a)}
.login-g-btn svg{width:20px;height:20px}
.login-skip{background:none;border:none;color:var(--t4);font-size:12px;cursor:pointer;padding:8px 16px;text-decoration:underline}

/* Layout */
.hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--brd);position:sticky;top:0;background:var(--bg);z-index:100}
.h-l{display:flex;align-items:center;gap:8px}
.h-logo{font-size:18px;color:var(--acc)}
.h-t{font-size:14px;font-weight:800;color:var(--t1);letter-spacing:-.5px}
.h-s{font-size:9px;color:var(--t4);font-family:var(--mono)}
.h-r{display:flex;align-items:center;gap:6px}
.h-btn{background:var(--s1);border:1px solid var(--brd);color:var(--t3);width:30px;height:30px;border-radius:8px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.h-avatar{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--acc)}

.nav{display:flex;gap:2px;padding:5px 10px;border-bottom:1px solid var(--brd);position:sticky;top:47px;background:var(--bg);z-index:99;overflow-x:auto}
.nb{flex-shrink:0;background:transparent;border:none;color:var(--t4);padding:8px 10px;font-size:10px;font-weight:600;cursor:pointer;border-radius:8px;display:flex;align-items:center;gap:4px;transition:all .12s;white-space:nowrap}
.nb.on{background:var(--acc-a);color:var(--acc)}

.mn{padding:10px 14px 120px}

/* Day strip */
.days{display:flex;gap:4px;justify-content:center;margin-bottom:10px}
.db{display:flex;flex-direction:column;align-items:center;padding:5px 0;border-radius:9px;background:rgba(255,255,255,.015);border:1.5px solid transparent;cursor:pointer;min-width:36px;transition:all .1s}
.db.sel{background:var(--acc-a);border-color:rgba(226,165,90,.2)}
.db .dw{font-size:8px;font-weight:600;color:#444;text-transform:uppercase;letter-spacing:.4px;margin-bottom:1px}
.db .dn{font-size:13px;font-weight:700;color:#444}
.db.sel .dn{color:var(--t1)}
.db.has .dn{color:var(--acc2)}
.db .dd{width:3px;height:3px;border-radius:2px;margin-top:2px;background:var(--acc2)}

.d-nav{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px}
.d-arr{background:var(--s1);border:1px solid var(--brd);color:#666;font-size:16px;width:28px;height:28px;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.d-lbl{font-size:10px;font-weight:600;color:#777}

.prog{position:relative;height:20px;background:var(--s1);border-radius:6px;overflow:hidden;margin:0 0 10px;border:1px solid var(--brd)}
.prog-b{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:6px;transition:width .3s}
.prog-t{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;color:var(--t1);font-family:var(--mono);text-shadow:0 1px 3px rgba(0,0,0,.6)}

/* Categories */
.cat{margin-bottom:4px;border-radius:10px;overflow:hidden;border:1px solid var(--brd)}
.cat-h{display:flex;justify-content:space-between;align-items:center;width:100%;padding:10px 12px;background:rgba(255,255,255,.015);border:none;cursor:pointer;color:var(--t2)}
.cat-l{display:flex;align-items:center;gap:7px}
.cat-d{width:6px;height:6px;border-radius:3px}
.cat-t{font-size:10px;font-weight:700;letter-spacing:.2px}
.cat-c{font-size:8px;color:#444;font-family:var(--mono)}
.cat-ch{font-size:14px;color:#444;transition:transform .12s}
.cat-ch.open{transform:rotate(90deg)}

.hr{padding:9px 12px;border-top:1px solid rgba(255,255,255,.02);background:rgba(255,255,255,.006)}
.ht{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.hi{font-size:11px}
.hl{font-size:10px;font-weight:600;color:var(--t3)}
.hdel{margin-left:auto;background:none;border:none;color:#333;font-size:12px;cursor:pointer;padding:2px 5px}

.rr{display:flex;gap:2px;flex-wrap:wrap}
.rb{width:23px;height:23px;border-radius:5px;border:1.5px solid rgba(255,255,255,.05);background:rgba(255,255,255,.015);color:#444;font-size:8px;font-weight:700;cursor:pointer;transition:all .1s}

.nr{display:flex;align-items:center}
.pm{width:30px;height:30px;border-radius:7px;border:1px solid var(--brd);background:var(--s1);color:var(--acc);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ni{width:48px;text-align:center;background:transparent;border:none;color:var(--t1);font-size:13px;font-weight:700;font-family:var(--mono)}

.br{display:flex;gap:5px}
.bb{padding:5px 16px;border-radius:7px;border:1.5px solid var(--brd);background:transparent;color:#555;font-size:10px;font-weight:600;cursor:pointer;transition:all .1s}
.bb.y{background:rgba(74,222,128,.1);border-color:var(--green);color:#6EE7B7}
.bb.n{background:rgba(232,93,93,.08);border-color:var(--red);color:#FCA5A5}

.ti{padding:6px 9px;border-radius:7px;border:1px solid var(--brd);background:rgba(255,255,255,.015);color:var(--t2);font-size:10px;width:100%}
.tai{padding:7px 9px;border-radius:9px;border:1px solid var(--brd);background:rgba(255,255,255,.015);color:var(--t2);font-size:10px;width:100%;resize:vertical;min-height:50px}
.tmi{padding:6px 9px;border-radius:7px;border:1px solid var(--brd);background:rgba(255,255,255,.015);color:var(--t1);font-size:11px;font-family:var(--mono)}

/* Add habit */
.add-s{margin:10px 0;padding:12px;border-radius:10px;border:1px dashed var(--brd2);background:rgba(255,255,255,.01)}
.add-t{font-size:11px;font-weight:700;color:var(--acc);margin-bottom:8px}
.add-g{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:6px}
.add-i{padding:7px 8px;border-radius:7px;border:1px solid var(--brd);background:var(--s1);color:var(--t2);font-size:10px}
.add-b{width:100%;padding:9px;border-radius:9px;border:none;background:var(--acc-a);color:var(--acc);font-size:11px;font-weight:700;cursor:pointer}

/* AI */
.ai-hd{text-align:center;padding:18px 14px 14px}
.ai-ic{font-size:28px;color:var(--acc);margin-bottom:5px}
.ai-tt{font-size:18px;font-weight:800;color:var(--t1);letter-spacing:-.5px;margin-bottom:3px}
.ai-ds{font-size:10px;color:var(--t4);line-height:1.4;max-width:280px;margin:0 auto}

.mg{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px}
.mc{padding:10px 9px;border-radius:10px;border:1.5px solid var(--brd);background:rgba(255,255,255,.01);cursor:pointer;text-align:left;transition:all .12s}
.mc.on{border-color:rgba(226,165,90,.2);background:var(--acc-a)}
.mic{font-size:14px;color:#444;margin-bottom:3px}
.mc.on .mic{color:var(--acc)}
.mlb{font-size:10px;font-weight:700;color:#555;margin-bottom:1px}
.mc.on .mlb{color:var(--acc)}
.mds{font-size:8px;color:#3A3A3A;line-height:1.3}

/* AI Provider */
.ap-sec{margin-bottom:10px;padding:12px;border-radius:10px;border:1px solid var(--brd);background:rgba(255,255,255,.01)}
.ap-t{font-size:10px;font-weight:700;color:var(--acc);margin-bottom:8px}
.ap-tabs{display:flex;gap:3px;margin-bottom:8px;flex-wrap:wrap}
.ap-tab{padding:5px 10px;border-radius:7px;border:1px solid var(--brd);background:transparent;color:#555;font-size:9px;font-weight:600;cursor:pointer}
.ap-tab.on{background:var(--acc-a);border-color:rgba(226,165,90,.2);color:var(--acc)}
.ap-tab .free{color:var(--green);font-size:7px;margin-left:3px}
.ap-tab .paid{color:var(--t4);font-size:7px;margin-left:3px}

.ki{width:100%;padding:8px 9px;border-radius:7px;border:1px solid var(--brd);background:var(--s1);color:var(--t2);font-size:10px;font-family:var(--mono);margin-bottom:4px}
.kh{font-size:8px;color:#333;line-height:1.4}
.kh a{color:var(--acc2);text-decoration:none}

.cq{width:100%;padding:9px;border-radius:9px;border:1px solid var(--brd2);background:rgba(255,255,255,.015);color:var(--t2);font-size:10px;resize:vertical;min-height:50px;margin-bottom:8px}

.run{width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,#3D2E16,#2A1F0E);color:var(--acc);font-size:12px;font-weight:700;cursor:pointer;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.3),inset 0 1px 0 rgba(226,165,90,.1)}
.run:disabled{opacity:.35}

/* Copy-paste box */
.cp-box{padding:12px;border-radius:10px;border:1px solid var(--brd);background:var(--s1);margin-bottom:12px}
.cp-t{font-size:10px;font-weight:700;color:var(--acc);margin-bottom:6px}
.cp-desc{font-size:9px;color:var(--t4);margin-bottom:6px;line-height:1.4}
.cp-area{width:100%;padding:8px;border-radius:7px;border:1px solid var(--brd);background:var(--bg);color:var(--t3);font-size:8px;font-family:var(--mono);min-height:80px;resize:vertical;margin-bottom:6px}
.cp-btn{padding:7px 14px;border-radius:7px;border:none;background:var(--acc-a);color:var(--acc);font-size:10px;font-weight:600;cursor:pointer}

.ao{border-radius:12px;overflow:hidden;border:1px solid rgba(226,165,90,.08);background:rgba(255,255,255,.01);margin-bottom:20px}
.ao-h{display:flex;align-items:center;gap:7px;padding:9px 12px;background:rgba(226,165,90,.04);font-size:10px;font-weight:700;color:var(--acc);border-bottom:1px solid rgba(226,165,90,.06)}
.ao-b{padding:12px}
.ao-b h2{font-size:14px;font-weight:800;color:var(--t1);margin:5px 0 7px}
.ao-b h3{font-size:12px;font-weight:700;color:var(--acc);margin:12px 0 5px;padding-bottom:3px;border-bottom:1px solid var(--brd)}
.ao-b h4{font-size:10px;font-weight:700;color:var(--acc2);margin:8px 0 3px;text-transform:uppercase;letter-spacing:.4px}
.ao-b p{font-size:10px;color:var(--t3);line-height:1.6;margin-bottom:3px}
.ao-b .bl{font-size:10px;color:var(--t3);line-height:1.5;margin-bottom:2px;padding-left:8px}
.ao-b strong{color:var(--t1)}

/* Export */
.exp-sec{padding:14px;border-radius:10px;border:1px solid var(--brd);background:rgba(255,255,255,.01);margin-bottom:12px}
.exp-t{font-size:11px;font-weight:700;color:var(--acc);margin-bottom:4px}
.exp-d{font-size:9px;color:var(--t4);margin-bottom:10px;line-height:1.4}
.exp-btns{display:flex;gap:6px;flex-wrap:wrap}
.exp-btn{padding:9px 16px;border-radius:9px;border:1px solid var(--brd2);background:var(--s1);color:var(--t2);font-size:11px;font-weight:600;cursor:pointer;transition:all .12s}
.exp-btn:hover{border-color:var(--acc);color:var(--acc)}

.ft{text-align:center;padding:16px;font-size:8px;color:#222;letter-spacing:1px;font-family:var(--mono)}
.ld{display:inline-block;width:12px;height:12px;border:2px solid var(--acc-a);border-top-color:var(--acc);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-left:4px}

/* Sync indicator */
.sync-bar{font-size:8px;text-align:center;padding:4px;color:var(--green);background:rgba(74,222,128,.06);border-bottom:1px solid rgba(74,222,128,.1)}
</style>
</head>
<body>
<div id="app"></div>
<script>

// ── GOOGLE CONFIG ──
const GAPI_CLIENT_ID = ''; // Users set this or use localStorage
const DRIVE_FILENAME = 'lifeos-backup.json';

// ── HABITS ──
const DH=[

const CT={
  sleep:{l:"Sleep & Rest",cl:"#8B5CF6"},
  fit:{l:"Fitness & Exercise",cl:"#EF4444"},
  eat:{l:"Eating & Meals",cl:"#F59E0B"},
  drink:{l:"Drinks",cl:"#06B6D4"},
  work:{l:"Work & Productivity",cl:"#3B82F6"},
  learn:{l:"Reading & Learning",cl:"#10B981"},

async function syncToDrive(){
  if(!S.user||!S.gToken)return;
  S.syncing=true;R();
  const data=JSON.stringify({entries:S.entries,custom:S.custom,exported:new Date().toISOString()});
  try{
    // Search for existing file
    let fileId=localStorage.getItem('los2-driveid');
    const headers={'Authorization':'Bearer '+S.gToken,'Content-Type':'application/json'};
    
    if(!fileId){
      const sr=await fetch('https://www.googleapis.com/drive/v3/files?q=name%3D%27'+DRIVE_FILENAME+'%27&spaces=appDataFolder',{headers});
      const srd=await sr.json();
      if(srd.files&&srd.files.length>0)fileId=srd.files[0].id;
    }

    const metadata={name:DRIVE_FILENAME,mimeType:'application/json'};
    if(!fileId)metadata.parents=['appDataFolder'];

    const form=new FormData();
    form.append('metadata',new Blob([JSON.stringify(metadata)],{type:'application/json'}));
    form.append('file',new Blob([data],{type:'application/json'}));

    const url=fileId?`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`:'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
    const method=fileId?'PATCH':'POST';
    
    const r=await fetch(url,{method,headers:{'Authorization':'Bearer '+S.gToken},body:form});
    const rd=await r.json();
    if(rd.id){localStorage.setItem('los2-driveid',rd.id);S.lastSync=new Date().toLocaleTimeString();localStorage.setItem('los2-lastsync',S.lastSync)}
  }catch(e){console.log('Drive sync error:',e)}
  S.syncing=false;R();
}

async function syncFromDrive(){
  if(!S.user||!S.gToken)return;
  try{
    const headers={'Authorization':'Bearer '+S.gToken};
    const sr=await fetch('https://www.googleapis.com/drive/v3/files?q=name%3D%27'+DRIVE_FILENAME+'%27&spaces=appDataFolder',{headers});
    const srd=await sr.json();
    if(srd.files&&srd.files.length>0){
      const fid=srd.files[0].id;
      localStorage.setItem('los2-driveid',fid);
      const fr=await fetch('https://www.googleapis.com/drive/v3/files/'+fid+'?alt=media',{headers});
      const fd=await fr.json();
      if(fd.entries){
        // Merge: keep newer data
        Object.keys(fd.entries).forEach(d=>{if(!S.entries[d])S.entries[d]=fd.entries[d]});
        if(fd.custom)S.custom=[...new Map([...fd.custom,...S.custom].map(h=>[h.id,h])).values()];
        sv();svC();R();
      }
    }
  }catch(e){console.log('Drive load error:',e)}
}

function buildPrompt(){
  const total=Object.keys(S.entries).length;
  const mode=AI_MODES.find(m=>m.id===S.aiMode);
  let sys=mode.p;
  if(S.aiMode==='ask'){
    if(!S.customQ.trim())return null;
    sys=`You are an AI life analyst. Answer using actual data. Be specific. Question: "${S.customQ}"`;
  }
  const sorted=Object.keys(S.entries).sort();
  const clean={};
  sorted.forEach(d=>{const day={};allH().forEach(h=>{if(S.entries[d]?.[h.id]!==undefined&&S.entries[d]?.[h.id]!=='')day[h.l]=S.entries[d][h.id]});if(Object.keys(day).length)clean[d]=day});
  const defs=allH().map(h=>{let d=`${h.l} (${CT[h.c]?.l||h.c})`;if(h.t==='rating')d+=' 1-10';if(h.t==='bool')d+=' yes/no';if(h.t==='num')d+=` ${h.mn||0}-${h.mx||100}`;return d}).join('\n');
  const userMsg=`${sys}\n\nData: ${total} days from ${sorted[0]} to ${sorted[sorted.length-1]}.\n\nHabits:\n${defs}\n\nEntries:\n${JSON.stringify(clean,null,2)}\n\nAnalyze now.`;
  return userMsg;
}

async function runAI(){
  const total=Object.keys(S.entries).length;
  if(total<1){S.aiRes='⚠ Log at least 1 day.';R();return}
  const prov=AI_PROVIDERS.find(p=>p.id===S.aiProv);
  
  if(prov.id==='paste'){generateCopyPaste();return}
  
  const key=apiKeys[prov.id]||'';
  if(!key.trim()){S.aiRes='⚠ Enter your '+prov.l+' API key above.';R();return}
  
  S.aiLoad=true;S.aiRes='';R();
  const msg=buildPrompt();
  if(!msg){S.aiRes='Type your question.';S.aiLoad=false;R();return}

  try{
    let body,headers={'Content-Type':'application/json'};
    
    if(prov.id==='gemini'){
      const r=await fetch(prov.url+'?key='+key,{method:'POST',headers,body:JSON.stringify({contents:[{parts:[{text:msg}]}],generationConfig:{maxOutputTokens:4096}})});
      const d=await r.json();
      S.aiRes=d.error?'⚠ '+d.error.message:d.candidates?.[0]?.content?.parts?.[0]?.text||'No response.';
    }
    else if(prov.id==='groq'){
      headers['Authorization']='Bearer '+key;
      const r=await fetch(prov.url,{method:'POST',headers,body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'user',content:msg}],max_tokens:4096})});
      const d=await r.json();
      S.aiRes=d.error?'⚠ '+(d.error.message||JSON.stringify(d.error)):d.choices?.[0]?.message?.content||'No response.';
    }
    else if(prov.id==='openai'){
      headers['Authorization']='Bearer '+key;
      const r=await fetch(prov.url,{method:'POST',headers,body:JSON.stringify({model:'gpt-4o-mini',messages:[{role:'user',content:msg}],max_tokens:4096})});
      const d=await r.json();
      S.aiRes=d.error?'⚠ '+d.error.message:d.choices?.[0]?.message?.content||'No response.';
    }
    else if(prov.id==='claude'){
      headers['x-api-key']=key;headers['anthropic-version']='2023-06-01';headers['anthropic-dangerous-direct-browser-access']='true';
      const r=await fetch(prov.url,{method:'POST',headers,body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4096,messages:[{role:'user',content:msg}]})});
      const d=await r.json();
      S.aiRes=d.error?'⚠ '+(d.error.message||JSON.stringify(d.error)):d.content?.map(c=>c.text||'').join('\n')||'No response.';
    }
  }catch(e){S.aiRes='⚠ Error: '+e.message}
  S.aiLoad=false;R();
}

function generateCopyPaste(){
  const msg=buildPrompt();
  if(!msg){S.aiRes='Type your question first.';R();return}
  S.aiRes='__PASTE__'+msg;R();
}

function exportCSV(){
  const sorted=Object.keys(S.entries).sort();
  if(!sorted.length){alert('No data to export');return}
  const habits=allH();
  
  // Group headers by category
  let headers=['Date'];
  Object.keys(CT).forEach(ck=>{
    habits.filter(h=>h.c===ck).forEach(h=>headers.push(h.l));
  });
  
  let csv=headers.join(',')+'\n';
  sorted.forEach(d=>{
    let row=[d];
    Object.keys(CT).forEach(ck=>{
      habits.filter(h=>h.c===ck).forEach(h=>{
        let v=S.entries[d]?.[h.id];
        if(v===undefined||v===null||v==='')v='';
        else if(typeof v==='string')v='"'+v.replace(/"/g,'""')+'"';
        else if(v===true)v='Yes';
        else if(v===false)v='No';
        row.push(v);
      });
    });
    csv+=row.join(',')+'\n';
  });
  
  download('LifeOS-Habits-'+ds()+'.csv',csv,'text/csv');
}

function download(name,content,type){
  const blob=new Blob([content],{type});

  const a=document.createElement('a');

}

      if(op)ch.forEach(h=>{
        const v=td[h.id],isC=S.custom.find(x=>x.id===h.id);
        H+=`<div class="hr"><div class="ht"><span class="hi" style="color:${cat.cl}">${h.i}</span><span class="hl">${h.l}</span>${isC?`<button class="hdel" onclick="delCH('${h.id}')">×</button>`:''}</div>`;
        if(h.t==='rating'){H+='<div class="rr">';for(let n=1;n<=10;n++){const on=n<=(v||0);H+=`<button class="rb" style="${on?`background:${cat.cl}22;border-color:${cat.cl};color:${cat.cl}`:''}" onclick="upd('${h.id}',${n})">${n}</button>`}H+='</div>'}
        else if(h.t==='num')H+=`<div class="nr"><button class="pm" onclick="upd('${h.id}',Math.max(${h.mn||0},(parseFloat(gD()['${h.id}'])||0)-${h.s||1}))">−</button><input type="number" class="ni" value="${v??''}" placeholder="—" onchange="upd('${h.id}',this.value===''?'':parseFloat(this.value))"><button class="pm" onclick="upd('${h.id}',Math.min(${h.mx||100},(parseFloat(gD()['${h.id}'])||0)+${h.s||1}))">+</button></div>`;
        else if(h.t==='bool')H+=`<div class="br"><button class="bb ${v===true?'y':''}" onclick="upd('${h.id}',true)">Yes</button><button class="bb ${v===false?'n':''}" onclick="upd('${h.id}',false)">No</button></div>`;
        else if(h.t==='time')H+=`<input type="time" class="tmi" value="${v||''}" onchange="upd('${h.id}',this.value)">`;
        else if(h.t==='text')H+=`<input type="text" class="ti" value="${(v||'').replace(/"/g,'&quot;')}" placeholder="${h.tip||''}" onchange="upd('${h.id}',this.value)">`;
        else if(h.t==='textarea')H+=`<textarea class="tai" placeholder="${h.tip||''}" onchange="upd('${h.id}',this.value)">${v||''}</textarea>`;
        H+='</div>';
      });
      H+='</div>';
    });
  }

  // ═══ AI ═══
  if(S.view==='ai'){
    H+=`<div class="ai-hd"><div class="ai-ic">◉</div><h2 class="ai-tt">AI Analyst</h2><p class="ai-ds">${total<1?'Log habits first.':total+' days ready.'}</p></div>`;
    H+='<div class="mg">';AI_MODES.forEach(m=>{H+=`<button class="mc ${S.aiMode===m.id?'on':''}" onclick="S.aiMode='${m.id}';R()"><div class="mic">${m.i}</div><div class="mlb">${m.l}</div><div class="mds">${m.d}</div></button>`});H+='</div>';
    if(S.aiMode==='ask')H+=`<textarea class="cq" placeholder="Ask anything..." onchange="S.customQ=this.value">${S.customQ}</textarea>`;

    // Provider selector
    H+='<div class="ap-sec"><div class="ap-t">AI Provider</div><div class="ap-tabs">';
    AI_PROVIDERS.forEach(p=>{H+=`<button class="ap-tab ${S.aiProv===p.id?'on':''}" onclick="S.aiProv='${p.id}';R()">${p.l}<span style="color:${p.tagCl}" class="free">${p.tag}</span></button>`});
    H+='</div>';

    const prov=AI_PROVIDERS.find(p=>p.id===S.aiProv);
    if(prov.id!=='paste'){
      H+=`<input type="password" class="ki" value="${apiKeys[prov.id]||''}" placeholder="${prov.keyPh}" onchange="apiKeys['${prov.id}']=this.value;svK()"><div class="kh">Get key: <a href="${prov.keyUrl}" target="_blank">${prov.keyTip}</a></div>`;
    }else{
      H+=`<div class="kh" style="color:var(--green)">No API key needed! Click below to generate your data + prompt, then paste it into ChatGPT, Gemini, or Claude UI.</div>`;
    }
    H+='</div>';

    H+=`<button class="run" onclick="runAI()" ${S.aiLoad||total<1?'disabled':''}>${S.aiLoad?'◉ Analyzing <span class="ld"></span>':prov.id==='paste'?'◉ Generate Copy-Paste Data':'◉ Run AI Analysis'}</button>`;

    if(S.aiRes){
      if(S.aiRes.startsWith('__PASTE__')){
        const txt=S.aiRes.slice(9);
        H+=`<div class="cp-box"><div class="cp-t">📋 Copy & Paste to AI</div><div class="cp-desc">Copy the text below and paste it into ChatGPT, Gemini, or Claude:</div><textarea class="cp-area" id="cp-text" readonly>${txt.replace(/</g,'&lt;')}</textarea><button class="cp-btn" onclick="document.getElementById('cp-text').select();document.execCommand('copy');this.textContent='✓ Copied!'">📋 Copy to Clipboard</button></div>`;
      }else{
        H+=`<div class="ao"><div class="ao-h"><span>◉</span> Results</div><div class="ao-b">${renderMD(S.aiRes)}</div></div>`;
      }
    }
  }

  // ═══ EXPORT ═══
  if(S.view==='export'){
    H+=`<div class="ai-hd"><div class="ai-ic">↓</div><h2 class="ai-tt">Export Data</h2><p class="ai-ds">${total} days of habit data ready to export.</p></div>`;
    
    H+=`<div class="exp-sec"><div class="exp-t">📊 Clean CSV Export</div><div class="exp-d">Organized spreadsheet with columns grouped by category. Open in Excel or Google Sheets.</div><div class="exp-btns"><button class="exp-btn" onclick="exportCSV()">↓ Download CSV</button></div></div>`;
    
    H+=`<div class="exp-sec"><div class="exp-t">📦 JSON Export</div><div class="exp-d">Structured data grouped by category per day. Perfect for developers or data analysis.</div><div class="exp-btns"><button class="exp-btn" onclick="exportJSON()">↓ Download JSON</button></div></div>`;
    
    H+=`<div class="exp-sec"><div class="exp-t">🤖 AI-Ready Export (Recommended)</div><div class="exp-d">Clean text file organized by category with a built-in analysis prompt. Upload directly to ChatGPT, Gemini, or Claude UI for free analysis.</div><div class="exp-btns"><button class="exp-btn" onclick="exportAIReady()">↓ Download AI-Ready .txt</button></div></div>`;
    
    if(S.user){
      H+=`<div class="exp-sec"><div class="exp-t">☁ Google Drive Backup</div><div class="exp-d">Manually sync your data to Google Drive now.</div><div class="exp-btns"><button class="exp-btn" onclick="syncToDrive()">☁ Sync Now</button></div></div>`;
    }
  }

  // ═══ CUSTOM ═══
  if(S.view==='custom'){
    H+=`<div class="ai-hd"><div class="ai-ic">◆</div><h2 class="ai-tt">Custom Habits</h2><p class="ai-ds">Add anything you want to track.</p></div>`;
    if(S.custom.length){H+='<div style="margin-bottom:12px">';S.custom.forEach(h=>{H+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;margin-bottom:3px;border-radius:8px;background:rgba(255,255,255,.02);border:1px solid var(--brd)"><div><span style="margin-right:6px">${h.i}</span><span style="font-size:11px;font-weight:600;color:var(--t2)">${h.l}</span><span style="font-size:9px;color:#444;margin-left:6px">${h.t}</span></div><button onclick="delCH('${h.id}')" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:14px">×</button></div>`});H+='</div>'}
    H+=`<div class="add-s"><div class="add-t">+ Add New Habit</div><div class="add-g"><input class="add-i" placeholder="Name" value="${S.addN}" oninput="S.addN=this.value"><input class="add-i" placeholder="Icon" value="${S.addI}" oninput="S.addI=this.value" maxlength="2"><select class="add-i" onchange="S.addC=this.value">${Object.entries(CT).map(([k,c])=>`<option value="${k}" ${S.addC===k?'selected':''}>${c.l}</option>`).join('')}</select><select class="add-i" onchange="S.addT=this.value">${['num','rating','bool','text','time','textarea'].map(t=>`<option value="${t}" ${S.addT===t?'selected':''}>${{num:'Number',rating:'Rating 1-10',bool:'Yes/No',text:'Short Text',time:'Time',textarea:'Long Text'}[t]}</option>`).join('')}</select></div><button class="add-b" onclick="addCH()">+ Add Habit</button></div>`;
  }

  H+='</div><div class="ft">Life OS v2 · Track → Analyze → Transform</div>';
  app.innerHTML=H;
}

// Google Sign-in trigger
function googleSignIn(){
  // Use popup-based OAuth for simplicity
  const cid=prompt('To enable Google Sign-in, enter your Google OAuth Client ID.\n\nGet one free at console.cloud.google.com → APIs → Credentials → OAuth Client ID.\n\nOr press Cancel to skip sign-in.');
  if(cid){
    localStorage.setItem('los2-gcid',cid);
    google.accounts.id.initialize({client_id:cid,callback:handleGoogleLogin});
    google.accounts.id.prompt();
  }
}

if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js',{scope:'./'}).catch(function(){});}
R();
</script>
