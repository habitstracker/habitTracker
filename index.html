<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">

<link rel="manifest" href="./manifest.json">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#080A0F;--s1:#0E1117;--s2:#151921;--brd:rgba(255,255,255,0.05);--brd2:rgba(255,255,255,0.09);--t1:#E8E2D6;--t2:#B8AFA0;--t3:#7A7265;--t4:#4A443C;--acc:#E2A55A;--acc2:#C4883C;--acc-a:rgba(226,165,90,0.12);--red:#E85D5D;--green:#4ADE80;--blue:#60A5FA;--purple:#C084FC;--mono:'IBM Plex Mono',monospace;--sans:'Sora',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:var(--sans);background:var(--bg);color:var(--t2);min-height:100dvh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
input,textarea,button,select{font-family:inherit}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
:focus{outline:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fi{animation:fadeIn .25s ease}

.hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--brd);position:sticky;top:0;background:var(--bg);z-index:100}
.h-l{display:flex;align-items:center;gap:8px}
.h-logo{font-size:18px;color:var(--acc)}
.h-t{font-size:14px;font-weight:800;color:var(--t1);letter-spacing:-.5px}
.h-s{font-size:9px;color:var(--t4);font-family:var(--mono)}
.h-btn{background:var(--s1);border:1px solid var(--brd);color:var(--t3);width:30px;height:30px;border-radius:8px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}

.nav{display:flex;gap:2px;padding:5px 10px;border-bottom:1px solid var(--brd);position:sticky;top:47px;background:var(--bg);z-index:99;overflow-x:auto}
.nb{flex-shrink:0;background:transparent;border:none;color:var(--t4);padding:8px 10px;font-size:10px;font-weight:600;cursor:pointer;border-radius:8px;display:flex;align-items:center;gap:4px;transition:all .12s;white-space:nowrap}
.nb.on{background:var(--acc-a);color:var(--acc)}

.mn{padding:10px 14px 120px}

.days{display:flex;gap:4px;justify-content:center;margin-bottom:10px}
.db{display:flex;flex-direction:column;align-items:center;padding:5px 0;border-radius:9px;background:rgba(255,255,255,.015);border:1.5px solid transparent;cursor:pointer;min-width:36px;transition:all .1s}
.db.sel{background:var(--acc-a);border-color:rgba(226,165,90,.2)}
.db .dw{font-size:8px;font-weight:600;color:#444;text-transform:uppercase;letter-spacing:.4px;margin-bottom:1px}
.db .dn{font-size:13px;font-weight:700;color:#444}
.db.sel .dn{color:var(--t1)}
.db.has .dn{color:var(--acc2)}
.db .dd{width:3px;height:3px;border-radius:2px;margin-top:2px;background:var(--acc2)}

.d-nav{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px}
.d-arr{background:var(--s1);border:1px solid var(--brd);color:#666;font-size:16px;width:28px;height:28px;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.d-lbl{font-size:10px;font-weight:600;color:#777}

.prog{position:relative;height:20px;background:var(--s1);border-radius:6px;overflow:hidden;margin:0 0 10px;border:1px solid var(--brd)}
.prog-b{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:6px;transition:width .3s}
.prog-t{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;color:var(--t1);font-family:var(--mono);text-shadow:0 1px 3px rgba(0,0,0,.6)}

.cat{margin-bottom:4px;border-radius:10px;overflow:hidden;border:1px solid var(--brd)}
.cat-h{display:flex;justify-content:space-between;align-items:center;width:100%;padding:10px 12px;background:rgba(255,255,255,.015);border:none;cursor:pointer;color:var(--t2)}
.cat-l{display:flex;align-items:center;gap:7px}
.cat-d{width:6px;height:6px;border-radius:3px}
.cat-t{font-size:10px;font-weight:700;letter-spacing:.2px}
.cat-c{font-size:8px;color:#444;font-family:var(--mono)}
.cat-ch{font-size:14px;color:#444;transition:transform .12s}
.cat-ch.open{transform:rotate(90deg)}

.hr{padding:9px 12px;border-top:1px solid rgba(255,255,255,.02);background:rgba(255,255,255,.006)}
.ht{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.hi{font-size:11px}
.hl{font-size:10px;font-weight:600;color:var(--t3)}
.hdel{margin-left:auto;background:none;border:none;color:#333;font-size:12px;cursor:pointer}

.rr{display:flex;gap:2px;flex-wrap:wrap}
.rb{width:23px;height:23px;border-radius:5px;border:1.5px solid rgba(255,255,255,.05);background:rgba(255,255,255,.015);color:#444;font-size:8px;font-weight:700;cursor:pointer;transition:all .1s}
.nr{display:flex;align-items:center}
.pm{width:30px;height:30px;border-radius:7px;border:1px solid var(--brd);background:var(--s1);color:var(--acc);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ni{width:48px;text-align:center;background:transparent;border:none;color:var(--t1);font-size:13px;font-weight:700;font-family:var(--mono)}
.br{display:flex;gap:5px}
.bb{padding:5px 16px;border-radius:7px;border:1.5px solid var(--brd);background:transparent;color:#555;font-size:10px;font-weight:600;cursor:pointer;transition:all .1s}
.bb.y{background:rgba(74,222,128,.1);border-color:var(--green);color:#6EE7B7}
.bb.n{background:rgba(232,93,93,.08);border-color:var(--red);color:#FCA5A5}
.ti{padding:6px 9px;border-radius:7px;border:1px solid var(--brd);background:rgba(255,255,255,.015);color:var(--t2);font-size:10px;width:100%}
.tai{padding:7px 9px;border-radius:9px;border:1px solid var(--brd);background:rgba(255,255,255,.015);color:var(--t2);font-size:10px;width:100%;resize:vertical;min-height:50px}
.tmi{padding:6px 9px;border-radius:7px;border:1px solid var(--brd);background:rgba(255,255,255,.015);color:var(--t1);font-size:11px;font-family:var(--mono)}

.add-s{margin:10px 0;padding:12px;border-radius:10px;border:1px dashed var(--brd2);background:rgba(255,255,255,.01)}
.add-t{font-size:11px;font-weight:700;color:var(--acc);margin-bottom:8px}
.add-g{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:6px}
.add-i{padding:7px 8px;border-radius:7px;border:1px solid var(--brd);background:var(--s1);color:var(--t2);font-size:10px}
.add-b{width:100%;padding:9px;border-radius:9px;border:none;background:var(--acc-a);color:var(--acc);font-size:11px;font-weight:700;cursor:pointer}

.sec-hd{text-align:center;padding:18px 14px 14px}
.sec-ic{font-size:28px;color:var(--acc);margin-bottom:5px}
.sec-tt{font-size:18px;font-weight:800;color:var(--t1);letter-spacing:-.5px;margin-bottom:3px}
.sec-ds{font-size:10px;color:var(--t4);line-height:1.4;max-width:280px;margin:0 auto}

.mg{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px}
.mc{padding:10px 9px;border-radius:10px;border:1.5px solid var(--brd);background:rgba(255,255,255,.01);cursor:pointer;text-align:left;transition:all .12s}
.mc.on{border-color:rgba(226,165,90,.2);background:var(--acc-a)}
.mic{font-size:14px;color:#444;margin-bottom:3px}.mc.on .mic{color:var(--acc)}
.mlb{font-size:10px;font-weight:700;color:#555;margin-bottom:1px}.mc.on .mlb{color:var(--acc)}
.mds{font-size:8px;color:#3A3A3A;line-height:1.3}

.ap-sec{margin-bottom:10px;padding:12px;border-radius:10px;border:1px solid var(--brd);background:rgba(255,255,255,.01)}
.ap-t{font-size:10px;font-weight:700;color:var(--acc);margin-bottom:8px}
.ap-tabs{display:flex;gap:3px;margin-bottom:8px;flex-wrap:wrap}
.ap-tab{padding:5px 10px;border-radius:7px;border:1px solid var(--brd);background:transparent;color:#555;font-size:9px;font-weight:600;cursor:pointer}
.ap-tab.on{background:var(--acc-a);border-color:rgba(226,165,90,.2);color:var(--acc)}
.ki{width:100%;padding:8px 9px;border-radius:7px;border:1px solid var(--brd);background:var(--s1);color:var(--t2);font-size:10px;font-family:var(--mono);margin-bottom:4px}
.kh{font-size:8px;color:#333;line-height:1.4}.kh a{color:var(--acc2);text-decoration:none}
.cq{width:100%;padding:9px;border-radius:9px;border:1px solid var(--brd2);background:rgba(255,255,255,.015);color:var(--t2);font-size:10px;resize:vertical;min-height:50px;margin-bottom:8px}
.run{width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,#3D2E16,#2A1F0E);color:var(--acc);font-size:12px;font-weight:700;cursor:pointer;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.3),inset 0 1px 0 rgba(226,165,90,.1)}
.run:disabled{opacity:.35}

.cp-box{padding:12px;border-radius:10px;border:1px solid var(--brd);background:var(--s1);margin-bottom:12px}
.cp-t{font-size:10px;font-weight:700;color:var(--acc);margin-bottom:6px}
.cp-desc{font-size:9px;color:var(--t4);margin-bottom:6px;line-height:1.4}
.cp-area{width:100%;padding:8px;border-radius:7px;border:1px solid var(--brd);background:var(--bg);color:var(--t3);font-size:8px;font-family:var(--mono);min-height:80px;resize:vertical;margin-bottom:6px}
.cp-btn{padding:7px 14px;border-radius:7px;border:none;background:var(--acc-a);color:var(--acc);font-size:10px;font-weight:600;cursor:pointer}

.ao{border-radius:12px;overflow:hidden;border:1px solid rgba(226,165,90,.08);background:rgba(255,255,255,.01);margin-bottom:20px}
.ao-h{display:flex;align-items:center;gap:7px;padding:9px 12px;background:rgba(226,165,90,.04);font-size:10px;font-weight:700;color:var(--acc);border-bottom:1px solid rgba(226,165,90,.06)}
.ao-b{padding:12px}
.ao-b h2{font-size:14px;font-weight:800;color:var(--t1);margin:5px 0 7px}
.ao-b h3{font-size:12px;font-weight:700;color:var(--acc);margin:12px 0 5px;padding-bottom:3px;border-bottom:1px solid var(--brd)}
.ao-b h4{font-size:10px;font-weight:700;color:var(--acc2);margin:8px 0 3px;text-transform:uppercase;letter-spacing:.4px}
.ao-b p{font-size:10px;color:var(--t3);line-height:1.6;margin-bottom:3px}
.ao-b .bl{font-size:10px;color:var(--t3);line-height:1.5;margin-bottom:2px;padding-left:8px}
.ao-b strong{color:var(--t1)}

.es{padding:12px;border-radius:10px;border:1px solid var(--brd);background:rgba(255,255,255,.01);margin-bottom:10px}
.es-t{font-size:11px;font-weight:700;color:var(--acc);margin-bottom:3px}
.es-d{font-size:9px;color:var(--t4);margin-bottom:8px;line-height:1.4}
.es-btns{display:flex;gap:6px;flex-wrap:wrap}
.es-btn{padding:8px 14px;border-radius:8px;border:1px solid var(--brd2);background:var(--s1);color:var(--t2);font-size:10px;font-weight:600;cursor:pointer;transition:all .12s}
.es-btn:hover{border-color:var(--acc);color:var(--acc)}

.ft{text-align:center;padding:16px;font-size:8px;color:#222;letter-spacing:1px;font-family:var(--mono)}
.ld{display:inline-block;width:12px;height:12px;border:2px solid var(--acc-a);border-top-color:var(--acc);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-left:4px}
.restore-input{display:none}
.success-msg{padding:8px 12px;border-radius:8px;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.2);color:var(--green);font-size:10px;margin-bottom:10px;text-align:center}
</style>

function backupData(){
  const data={version:3,date:new Date().toISOString(),entries:S.entries,custom:S.custom,keys:keys};
  download('LifeOS-Backup-'+ds()+'.json',JSON.stringify(data),'application/json');
  S.msg='✓ Backup downloaded!';R();setTimeout(()=>{S.msg='';R()},3000);
}

function restoreBackup(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(data.entries){
        // Merge data — keep existing + add new
        Object.keys(data.entries).forEach(d=>{
          if(!S.entries[d])S.entries[d]=data.entries[d];
          else{// Merge individual habits
            Object.keys(data.entries[d]).forEach(k=>{if(!S.entries[d][k])S.entries[d][k]=data.entries[d][k]});
          }
        });
        if(data.custom)S.custom=[...new Map([...data.custom,...S.custom].map(h=>[h.id,h])).values()];
        if(data.keys)keys={...data.keys,...keys};
        sv();svC();svK();
        S.msg='✓ Data restored! '+Object.keys(S.entries).length+' days loaded.';R();setTimeout(()=>{S.msg='';R()},4000);
      }else{S.msg='⚠ Invalid backup file.';R()}
    }catch(err){S.msg='⚠ Error reading file.';R()}
  };
  reader.readAsText(file);
  input.value='';
}

function buildPrompt(){
  const total=Object.keys(S.entries).length;
  const mode=AI_MODES.find(m=>m.id===S.aiMode);
  let sys=mode.p;
  if(S.aiMode==='ask'){if(!S.customQ.trim())return null;sys=`You are an AI life analyst. Use actual data. Question: "${S.customQ}"`}
  const sorted=Object.keys(S.entries).sort();
  const clean={};
  sorted.forEach(d=>{const day={};AH().forEach(h=>{if(S.entries[d]?.[h.id]!==undefined&&S.entries[d]?.[h.id]!=='')day[h.l]=S.entries[d][h.id]});if(Object.keys(day).length)clean[d]=day});
  return`${sys}\n\nData: ${total} days (${sorted[0]} to ${sorted[sorted.length-1]}).\n\nEntries:\n${JSON.stringify(clean,null,2)}\n\nAnalyze now.`;
}

async function runAI(){
  const total=Object.keys(S.entries).length;
  if(total<1){S.aiRes='⚠ Log at least 1 day.';R();return}
  const p=PROVS.find(x=>x.id===S.aiProv);
  if(p.id==='paste'){const msg=buildPrompt();if(!msg){S.aiRes='Type question.';R();return}S.aiRes='__PASTE__'+msg;R();return}
  const key=keys[p.id]||'';
  if(!key.trim()){S.aiRes='⚠ Enter '+p.l+' API key.';R();return}
  S.aiLoad=true;S.aiRes='';R();
  const msg=buildPrompt();if(!msg){S.aiRes='Type question.';S.aiLoad=false;R();return}
  try{
    let hd={'Content-Type':'application/json'};
    if(p.id==='gemini'){
      const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key='+key,{method:'POST',headers:hd,body:JSON.stringify({contents:[{parts:[{text:msg}]}],generationConfig:{maxOutputTokens:4096}})});
      const d=await r.json();S.aiRes=d.error?'⚠ '+d.error.message:d.candidates?.[0]?.content?.parts?.[0]?.text||'No response.';
    }else if(p.id==='groq'){
      hd['Authorization']='Bearer '+key;
      const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:hd,body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'user',content:msg}],max_tokens:4096})});
      const d=await r.json();S.aiRes=d.error?'⚠ '+(d.error.message||JSON.stringify(d.error)):d.choices?.[0]?.message?.content||'No response.';
    }else if(p.id==='openai'){
      hd['Authorization']='Bearer '+key;
      const r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:hd,body:JSON.stringify({model:'gpt-4o-mini',messages:[{role:'user',content:msg}],max_tokens:4096})});
      const d=await r.json();S.aiRes=d.error?'⚠ '+d.error.message:d.choices?.[0]?.message?.content||'No response.';
    }else if(p.id==='claude'){
      hd['x-api-key']=key;hd['anthropic-version']='2023-06-01';hd['anthropic-dangerous-direct-browser-access']='true';
      const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:hd,body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4096,messages:[{role:'user',content:msg}]})});
      const d=await r.json();S.aiRes=d.error?'⚠ '+(d.error.message||JSON.stringify(d.error)):d.content?.map(c=>c.text||'').join('\n')||'No response.';
    }
  }catch(e){S.aiRes='⚠ Error: '+e.message}
  S.aiLoad=false;R();
}

function renderMD(t){return t.split('\n').map(l=>{const x=l.trim();if(!x)return'<div style="height:4px"></div>';if(x.startsWith('### '))return'<h4>'+x.slice(4)+'</h4>';if(x.startsWith('## '))return'<h3>'+x.slice(3)+'</h3>';if(x.startsWith('# '))return'<h2>'+x.slice(2)+'</h2>';if(/^[-*] \*\*/.test(x)){const i=x.slice(2).replace(/\*\*/g,'');const[b,...r]=i.split(':');return'<div class="bl"><strong>'+b+(r.length?':':'')+'</strong>'+r.join(':')+'</div>'}if(x.startsWith('- ')||x.startsWith('* '))return'<div class="bl">• '+x.slice(2)+'</div>';if(/^\d+\./.test(x))return'<div class="bl">'+x+'</div>';return'<p>'+x.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')+'</p>'}).join('')}
